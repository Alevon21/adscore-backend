services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adscore
      POSTGRES_USER: adscore
      POSTGRES_PASSWORD: adscore_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adscore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
